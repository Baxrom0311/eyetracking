<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GazeSpeak — Ko'z Kuzatuv Tizimi</title>
    <meta name="description" content="GazeSpeak — brauzer orqali ko'z harakatini kuzatish va boshqarish tizimi.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">👁️</span>
                <span class="logo-text">GazeSpeak</span>
            </div>
        </div>
        <div class="header-center">
            <div id="status-badge" class="status-badge status-disconnected">
                <span class="status-dot"></span>
                <span id="status-text">Ulanmagan</span>
            </div>
        </div>
        <div class="header-right">
            <span id="fps-display" class="fps-badge">0 FPS</span>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content">
        <!-- Camera Section -->
        <section id="camera-section" class="glass-card">
            <div id="camera-container">
                <video id="camera-video" autoplay playsinline muted></video>
                <canvas id="overlay-canvas"></canvas>
                <!-- Gaze cursor (absolute positioned on screen) -->
                <div id="gaze-cursor" class="gaze-cursor hidden"></div>
            </div>

            <!-- Controls -->
            <div id="controls" class="controls-bar">
                <button id="btn-start-camera" class="btn btn-primary">
                    📷 Kamerani ochish
                </button>
                <button id="btn-calibrate" class="btn btn-accent" disabled>
                    🎯 Kalibratsiya
                </button>
                <button id="btn-recalibrate" class="btn btn-secondary" disabled>
                    🔄 Qayta kalibratsiya
                </button>
            </div>
        </section>

        <!-- Info Panel -->
        <aside id="info-panel" class="glass-card">
            <h2>Ma'lumotlar</h2>
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">Holat</span>
                    <span id="info-state" class="info-value">—</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Kayfiyat</span>
                    <span id="info-emotion" class="info-value">—</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Yuz</span>
                    <span id="info-face" class="info-value">—</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Gaze</span>
                    <span id="info-gaze" class="info-value">—</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Zona</span>
                    <span id="info-zone" class="info-value">—</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Kalibrasiya</span>
                    <span id="info-calib" class="info-value">Yo'q</span>
                </div>
            </div>

            <!-- Zone Map -->
            <h3>Ekran Zonalari</h3>
            <div id="zone-map" class="zone-map">
                <div class="zone-cell" data-zone="0">↖ Yuqori chap</div>
                <div class="zone-cell" data-zone="1">↗ Yuqori o'ng</div>
                <div class="zone-cell" data-zone="2">↙ Pastki chap</div>
                <div class="zone-cell" data-zone="3">↘ Pastki o'ng</div>
                <div class="zone-cell zone-center" data-zone="4">⊙ Markaz</div>
            </div>
        </aside>
    </main>

    <!-- Calibration Overlay -->
    <div id="calibration-overlay" class="calibration-overlay hidden">
        <canvas id="calibration-canvas"></canvas>
        <div id="calib-status" class="calib-status">
            <span id="calib-text">Kalibratsiya boshlanmoqda...</span>
        </div>
    </div>

    <!-- Banner / Notification -->
    <div id="banner" class="banner hidden">
        <span id="banner-text"></span>
    </div>

    <!-- Gaze indicator (full-screen, absolute) -->
    <div id="screen-gaze-dot" class="screen-gaze-dot hidden"></div>

    <script src="/static/js/main.js" type="module"></script>
</body>
</html>
